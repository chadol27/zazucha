<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Control</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
    }
    body {
      margin: 0;
      padding: 24px;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }
    section {
      margin-bottom: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      gap: 10px;
      align-items: center;
    }
    button {
      min-height: 48px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      color: #eee;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .panel {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px 14px;
      padding: 16px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #181818;
    }
    .label {
      color: #aaa;
    }
    @media (max-width: 520px) {
      body {
        padding: 16px;
      }
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main>
  <h1>Robot Control</h1>

  <section>
    <div class="grid">
      <div></div>
      <button onclick="manual('w')">W</button>
      <div></div>
      <button onclick="manual('a')">A</button>
      <button onclick="manual('x')">STOP</button>
      <button onclick="manual('d')">D</button>
      <div></div>
      <button onclick="manual('s')">S</button>
      <div></div>
    </div>
  </section>

  <section class="row">
    <button onclick="trackingStart()">Object Tracking ON</button>
    <button onclick="trackingStop()">Tracking STOP</button>
  </section>

  <section>
    <h2>Imitation Learning</h2>
    <div class="row">
      <button onclick="collectionStart()">수집 시작</button>
      <button onclick="collectionStop()">수집 중단</button>
      <button onclick="deleteData()">수집된 이미지 삭제</button>
      <button onclick="trainModel()">학습</button>
      <button onclick="cameraReconnect()">카메라 재연결</button>
      <button onclick="imitationStart()">운행 시작</button>
      <button onclick="imitationStop()">운행 종료</button>
    </div>
  </section>

  <section class="panel">
    <div class="label">Mode</div><div id="mode">-</div>
    <div class="label">Last Command</div><div id="last_command">-</div>
    <div class="label">Distance</div><div id="distance">-</div>
    <div class="label">Obstacle</div><div id="obstacle">-</div>
    <div class="label">Arduino</div><div id="arduino">-</div>
    <div class="label">HuskyLens</div><div id="huskylens">-</div>
    <div class="label">Target</div><div id="target">-</div>
    <div class="label">Camera</div><div id="camera">-</div>
    <div class="label">Collecting</div><div id="collecting">-</div>
    <div class="label">Dataset</div><div id="dataset">-</div>
    <div class="label">Training</div><div id="training">-</div>
    <div class="label">Model</div><div id="model">-</div>
    <div class="label">Line Prediction</div><div id="line_prediction">-</div>
  </section>
</main>

<script>
const movementKeys = new Set(["w", "a", "s", "d"]);
const pressedMovementKeys = [];
let activeKeyboardCommand = null;

async function post(url) {
  const res = await fetch(url, { method: "POST" });
  if (!res.ok) {
    const data = await res.json().catch(() => null);
    if (data && data.status) {
      renderStatus(data.status);
      return;
    }
  }
  await refreshStatus();
}

function manual(cmd) {
  post(`/api/manual/${cmd}`);
}

function trackingStart() {
  post("/api/tracking/start");
}

function trackingStop() {
  post("/api/tracking/stop");
}

function collectionStart() {
  post("/api/learning/collect/start");
}

function collectionStop() {
  post("/api/learning/collect/stop");
}

function deleteData() {
  post("/api/learning/data/delete");
}

function trainModel() {
  post("/api/learning/train");
}

function imitationStart() {
  post("/api/imitation/start");
}

function imitationStop() {
  post("/api/imitation/stop");
}

function cameraReconnect() {
  post("/api/camera/reconnect");
}

function syncKeyboardCommand() {
  const nextCommand = pressedMovementKeys.length > 0 ? pressedMovementKeys[0] : "x";

  if (nextCommand === activeKeyboardCommand) {
    return;
  }

  activeKeyboardCommand = nextCommand;
  manual(nextCommand);
}

function handleMovementKeyDown(event) {
  if (event.repeat) {
    return;
  }

  if (event.code === "Space") {
    event.preventDefault();
    trackingStart();
    return;
  }

  if (event.key === "Enter") {
    event.preventDefault();
    trackingStop();
    return;
  }

  const key = event.key.toLowerCase();
  if (!movementKeys.has(key)) {
    return;
  }

  event.preventDefault();
  if (!pressedMovementKeys.includes(key)) {
    pressedMovementKeys.push(key);
  }

  syncKeyboardCommand();
}

function handleMovementKeyUp(event) {
  const key = event.key.toLowerCase();
  if (!movementKeys.has(key)) {
    return;
  }

  event.preventDefault();
  const index = pressedMovementKeys.indexOf(key);
  if (index !== -1) {
    pressedMovementKeys.splice(index, 1);
  }

  syncKeyboardCommand();
}

async function refreshStatus() {
  const res = await fetch("/api/status");
  const status = await res.json();
  renderStatus(status);
}

function formatDuration(seconds) {
  if (seconds === null || seconds === undefined) {
    return "-";
  }

  const rounded = Math.max(0, Math.round(seconds));
  const minutes = Math.floor(rounded / 60);
  const secs = rounded % 60;
  if (minutes > 0) {
    return `${minutes}m ${secs}s`;
  }
  return `${secs}s`;
}

function renderStatus(status) {
  document.getElementById("mode").textContent = status.mode;
  document.getElementById("last_command").textContent = status.last_command;
  document.getElementById("distance").textContent =
    status.distance === null ? "-" : `${status.distance} cm`;
  document.getElementById("obstacle").textContent = status.obstacle ? "yes" : "no";
  document.getElementById("arduino").textContent =
    status.arduino_connected ? `connected (${status.arduino_port})` : `disconnected (${status.arduino_error || "no error"})`;
  document.getElementById("huskylens").textContent =
    status.huskylens_connected ? "connected" : `disconnected (${status.huskylens_error || "no error"})`;
  document.getElementById("target").textContent =
    status.target_detected ? `ID ${status.target_id}, x ${status.target_x}` : "not detected";
  document.getElementById("camera").textContent =
    status.camera_connected ? `connected (${status.camera_index})` : `disconnected (${status.camera_error || "no error"})`;
  document.getElementById("collecting").textContent = status.collecting ? "yes" : "no";
  document.getElementById("dataset").textContent =
    status.dataset_counts
      ? `forward ${status.dataset_counts.forward}, left ${status.dataset_counts.left}, right ${status.dataset_counts.right}`
      : "-";
  if (status.training) {
    const percent = Math.round((status.train_progress || 0) * 100);
    document.getElementById("training").textContent =
      `${status.train_message || "running"} (${percent}%, ETA ${formatDuration(status.train_eta_seconds)})`;
  } else {
    document.getElementById("training").textContent = status.train_message || "idle";
  }
  document.getElementById("model").textContent =
    status.model_ready ? "ready" : "not ready";
  document.getElementById("line_prediction").textContent =
    status.last_prediction
      ? `${status.last_prediction} (${Math.round(status.last_prediction_confidence * 100)}%)`
      : "-";
}

window.addEventListener("keydown", handleMovementKeyDown);
window.addEventListener("keyup", handleMovementKeyUp);
setInterval(refreshStatus, {{ status_poll_interval_ms }});
refreshStatus();
</script>
</body>
</html>
